<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Check Anagram</h1>

    <input type="text" id="input1" placeholder="Enter first word">
    <input type="text" id="input2" placeholder="Enter second word">
    <button onclick="checkAnagram()">check anagram</button>
    <p id="result"></p>

<script>

function checkAnagram() {

    var input1 = document.getElementById("input1").value.toLowerCase();
    var input2 = document.getElementById("input2").value.toLowerCase();

    var w1 = input1.replaceAll(" ", "");
    var w2 = input2.replaceAll(" ", "");

    if (w1.length != w2.length) {
        document.getElementById("result").innerHTML = "Not Anagram";
        return;
    }

    // convert w2 to array so we can change values
    var arr2 = w2.split("");

    let count = 0;

    for (let i = 0; i < w1.length; i++) {

        for (let j = 0; j < arr2.length; j++) {

            if (w1[i] == arr2[j]) {
                count++;

             
                arr2[j] = "*";
                break;
            }
        }
    }

    if (count == w1.length) {
        document.getElementById("result").innerHTML = "Yes it is Anagram";
    } else {
        document.getElementById("result").innerHTML = "Not Anagram";
    }
}

</script>
    
</body>
</html>
